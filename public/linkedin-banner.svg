<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00cccc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00e5e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00cccc;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#00cccc;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bgGrad)" />

  <!-- Subtle left glow -->
  <rect width="500" height="396" fill="url(#glowLeft)" />

  <!-- Top accent line -->
  <rect x="0" y="0" width="1584" height="3" fill="url(#accentGrad)" />

  <!-- Subtle grid lines (vertical) -->
  <line x1="400" y1="0" x2="400" y2="396" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.04" />
  <line x1="800" y1="0" x2="800" y2="396" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.04" />
  <line x1="1200" y1="0" x2="1200" y2="396" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.04" />

  <!-- Subtle grid lines (horizontal) -->
  <line x1="0" y1="132" x2="1584" y2="132" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.04" />
  <line x1="0" y1="264" x2="1584" y2="264" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.04" />

  <!-- Decorative teal circle (right side) -->
  <circle cx="1420" cy="198" r="220" fill="#00cccc" fill-opacity="0.04" />
  <circle cx="1420" cy="198" r="150" fill="#00cccc" fill-opacity="0.04" />
  <circle cx="1420" cy="198" r="80" fill="#00cccc" fill-opacity="0.05" />

  <!-- Left accent bar -->
  <rect x="80" y="120" width="4" height="156" fill="url(#accentGrad)" rx="2" />

  <!-- Name -->
  <text x="108" y="183" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="700" fill="#f9f9f9" letter-spacing="-1">Drew Rubinstein</text>

  <!-- Teal underline under name -->
  <rect x="108" y="196" width="460" height="2" fill="url(#accentGrad)" rx="1" />

  <!-- Title -->
  <text x="110" y="244" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="400" fill="#00cccc" letter-spacing="1">Data Analytics  ·  Software Development  ·  AI &amp; Automation</text>

  <!-- Location / tagline -->
  <text x="110" y="290" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="300" fill="#999999" letter-spacing="0.5">AI Analyst @ SoftSnow  ·  UF Graduate  ·  drewrubinstein.com</text>

  <!-- Bottom accent line -->
  <rect x="0" y="393" width="1584" height="3" fill="url(#accentGrad)" />
</svg>
